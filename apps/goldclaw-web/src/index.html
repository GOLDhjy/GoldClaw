<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GoldClaw</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f0f0f;
      color: #e8e8e8;
      height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 14px 20px;
      border-bottom: 1px solid #1e1e1e;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }

    header h1 { font-size: 15px; font-weight: 600; color: #fff; }
    #status-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: #444; flex-shrink: 0;
      transition: background 0.3s;
    }
    #status-dot.online { background: #4ade80; }
    #status-dot.error  { background: #f87171; }

    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px 0;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .msg {
      max-width: 680px;
      width: 100%;
      margin: 0 auto;
      padding: 0 20px;
    }

    .msg-bubble {
      display: inline-block;
      padding: 10px 14px;
      border-radius: 12px;
      font-size: 14px;
      line-height: 1.6;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .msg.user { text-align: right; }
    .msg.user .msg-bubble {
      background: #1a56db;
      color: #fff;
      border-bottom-right-radius: 4px;
    }

    .msg.assistant .msg-bubble {
      background: #1a1a1a;
      color: #e8e8e8;
      border-bottom-left-radius: 4px;
    }

    .msg.system .msg-bubble {
      background: transparent;
      color: #555;
      font-size: 12px;
      padding: 4px 0;
    }

    .cursor::after {
      content: "▋";
      animation: blink 1s step-end infinite;
      color: #888;
    }
    @keyframes blink { 50% { opacity: 0; } }

    #input-area {
      border-top: 1px solid #1e1e1e;
      padding: 14px 20px;
      display: flex;
      gap: 10px;
      flex-shrink: 0;
      max-width: 720px;
      width: 100%;
      margin: 0 auto;
      align-self: center;
      width: 100%;
    }

    #input {
      flex: 1;
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 8px;
      color: #e8e8e8;
      font-size: 14px;
      padding: 10px 14px;
      resize: none;
      outline: none;
      font-family: inherit;
      line-height: 1.5;
      max-height: 160px;
      overflow-y: auto;
    }
    #input:focus { border-color: #1a56db; }
    #input::placeholder { color: #444; }

    #send-btn {
      background: #1a56db;
      border: none;
      border-radius: 8px;
      color: #fff;
      font-size: 14px;
      padding: 0 18px;
      cursor: pointer;
      flex-shrink: 0;
      transition: background 0.15s;
    }
    #send-btn:hover:not(:disabled) { background: #1e429f; }
    #send-btn:disabled { opacity: 0.4; cursor: default; }
  </style>
</head>
<body>
  <header>
    <div id="status-dot"></div>
    <h1>GoldClaw</h1>
  </header>

  <div id="messages"></div>

  <div id="input-area">
    <textarea id="input" rows="1" placeholder="输入消息…" disabled></textarea>
    <button id="send-btn" disabled>发送</button>
  </div>

  <script>
    let gateway = '';
    let sessionId = null;
    let es = null;
    let streaming = null; // current streaming bubble element

    const messagesEl = document.getElementById('messages');
    const inputEl    = document.getElementById('input');
    const sendBtn    = document.getElementById('send-btn');
    const dot        = document.getElementById('status-dot');

    function setStatus(state) {
      dot.className = state === 'online' ? 'online' : state === 'error' ? 'error' : '';
    }

    function addMessage(role, text) {
      const wrap = document.createElement('div');
      wrap.className = `msg ${role}`;
      const bubble = document.createElement('div');
      bubble.className = 'msg-bubble';
      bubble.textContent = text;
      wrap.appendChild(bubble);
      messagesEl.appendChild(wrap);
      messagesEl.scrollTop = messagesEl.scrollHeight;
      return bubble;
    }

    function startStreaming() {
      streaming = addMessage('assistant', '');
      streaming.classList.add('cursor');
    }

    function appendChunk(chunk) {
      if (!streaming) startStreaming();
      streaming.textContent += chunk;
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function finishStreaming(fullContent) {
      if (streaming) {
        streaming.textContent = fullContent;
        streaming.classList.remove('cursor');
        streaming = null;
      }
    }

    function subscribeEvents() {
      if (es) es.close();
      es = new EventSource(`${gateway}/sessions/${sessionId}/events`);

      es.addEventListener('message_chunk', e => {
        const data = JSON.parse(e.data);
        appendChunk(data.content);
      });

      es.addEventListener('message_completed', e => {
        const data = JSON.parse(e.data);
        finishStreaming(data.content);
        setReady(true);
      });

      es.addEventListener('error', e => {
        const data = JSON.parse(e.data);
        addMessage('system', `错误: ${data.message}`);
        setReady(true);
      });
    }

    async function createSession() {
      const res = await fetch(`${gateway}/sessions`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ title: 'web' }),
      });
      if (!res.ok) throw new Error(`创建会话失败: ${res.status}`);
      const session = await res.json();
      return session.id;
    }

    async function sendMessage(content) {
      await fetch(`${gateway}/messages`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ session_id: sessionId, content, source: 'web' }),
      });
    }

    function setReady(ready) {
      inputEl.disabled = !ready;
      sendBtn.disabled = !ready;
      if (ready) inputEl.focus();
    }

    async function init() {
      try {
        const cfg = await fetch('/config.json').then(r => r.json());
        gateway = cfg.gateway;

        sessionId = await createSession();
        subscribeEvents();
        setStatus('online');
        setReady(true);
        addMessage('system', '已连接。开始对话吧。');
      } catch (err) {
        setStatus('error');
        addMessage('system', `连接失败: ${err.message}`);
      }
    }

    async function submit() {
      const content = inputEl.value.trim();
      if (!content || sendBtn.disabled) return;
      inputEl.value = '';
      inputEl.style.height = 'auto';
      setReady(false);
      addMessage('user', content);
      startStreaming();
      try {
        await sendMessage(content);
      } catch (err) {
        finishStreaming('');
        addMessage('system', `发送失败: ${err.message}`);
        setReady(true);
      }
    }

    sendBtn.addEventListener('click', submit);

    inputEl.addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        submit();
      }
    });

    inputEl.addEventListener('input', () => {
      inputEl.style.height = 'auto';
      inputEl.style.height = `${inputEl.scrollHeight}px`;
    });

    init();
  </script>
</body>
</html>
